<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' https://a.espncdn.com https://*.espncdn.com data:; style-src 'self' 'unsafe-inline'; script-src 'self'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sports</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="widget">
      <header class="widget__header drag-region">
        <span class="widget__title" id="league-title">Sports</span>
        <div class="widget__header-actions no-drag">
          <button type="button" class="icon-btn" id="btn-refresh">↻</button>
          <button type="button" class="icon-btn" id="btn-settings">⚙</button>
        </div>
      </header>

      <main class="widget__main" id="view-main">
        <p class="widget__error" id="error-msg" hidden></p>
        <div class="widget__content" id="content" hidden>
          <div class="widget__location" id="games-heading">Current games</div>
          <div class="games-list" id="games-list"></div>
        </div>
        <p class="widget__loading" id="loading-msg">Loading...</p>
      </main>

      <section class="widget__settings no-drag" id="view-settings" hidden>
        <h2 class="widget__settings-title">Settings</h2>
        <label class="widget__label" for="league-select">League</label>
        <select id="league-select" class="widget__input">
          <option value="nba">NBA</option>
          <option value="nfl">NFL</option>
          <option value="mlb">MLB</option>
          <option value="nhl">NHL</option>
        </select>
        <p class="widget__settings-error" id="settings-error" hidden></p>
        <div class="widget__settings-actions">
          <button type="button" class="btn btn--ghost" id="btn-cancel">Back</button>
          <button type="button" class="btn btn--primary" id="btn-save">Save</button>
        </div>
      </section>
    </div>
    <script src="renderer.js"></script>
  </body>
</html>
