<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stocks</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="widget">
      <header class="widget__header drag-region">
        <span class="widget__title">Stocks</span>
        <div class="widget__header-actions no-drag">
          <button type="button" class="icon-btn" id="btn-edit" aria-pressed="false">✎</button>
          <button type="button" class="icon-btn" id="btn-refresh">↻</button>
          <button type="button" class="icon-btn" id="btn-settings">⚙</button>
        </div>
      </header>

      <nav class="city-tabs no-drag" id="symbol-tabs"></nav>

      <main class="widget__main" id="view-main">
        <p class="widget__error" id="error-msg" hidden></p>
        <div class="widget__content" id="content" hidden>
          <div class="widget__location" id="symbol-name"></div>
          <div class="widget__hero">
            <div class="widget__temp-block">
              <span class="widget__temp" id="price"></span>
            </div>
          </div>
          <p class="widget__desc" id="change"></p>
          <ul class="widget__meta">
            <li><span class="label">Open</span> <span id="open"></span></li>
            <li><span class="label">High</span> <span id="high"></span></li>
            <li><span class="label">Low</span> <span id="low"></span></li>
          </ul>
        </div>
        <p class="widget__loading" id="loading-msg">Loading...</p>
      </main>

      <section class="widget__settings no-drag" id="view-settings" hidden>
        <h2 class="widget__settings-title">Settings</h2>
        <label class="widget__label" for="symbol-input">Stock Symbol</label>
        <input
          type="text"
          id="symbol-input"
          class="widget__input"
          placeholder="e.g. AAPL"
          autocomplete="off"
        />
        <p class="widget__settings-error" id="settings-error" hidden></p>
        <div class="widget__settings-actions">
          <button type="button" class="btn btn--ghost" id="btn-cancel">Back</button>
          <button type="button" class="btn btn--primary" id="btn-save">Save</button>
        </div>
      </section>
    </div>
    <script src="renderer.js"></script>
  </body>
</html>
